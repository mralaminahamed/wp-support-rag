# Author: Al Amin Ahamed.
name: Bug report
description: Report a defect in the RAG service, ingestion, or admin UI.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please do not include secrets (API keys, tokens).
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - app/api (FastAPI / RAG)
        - app/ingestion (sources / Celery)
        - app/rag (retrieval / generation)
        - apps/admin (web UI)
        - eval / harness
        - infra (docker / CI)
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Expected vs. actual behaviour.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Provider/model (generation + embedding), pgvector mode, deploy (docker/local), versions.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
    validations:
      required: false
