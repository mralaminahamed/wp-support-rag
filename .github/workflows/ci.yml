name: CI

# Quality gates for wp-support-rag (NFR-MN-1/2/3).
# Author: Al Amin Ahamed.
#
# Steps unsuitable for local `act` runs are guarded with `if: ${{ !env.ACT }}`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.9.26"

# The Python service lives in apps/api/; all uv steps run there.
defaults:
  run:
    working-directory: apps/api

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen
      - name: mypy --strict
        run: uv run mypy --strict app eval

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    # Service containers are unavailable under local `act`; the DB integration
    # test self-skips there, so unit tests still run.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wprag
          POSTGRES_PASSWORD: wprag
          POSTGRES_DB: wprag
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U wprag -d wprag"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      WPRAG_DATABASE_DSN: postgresql+asyncpg://wprag:wprag@localhost:5432/wprag
      WPRAG_REDIS_DSN: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Apply migrations
        if: ${{ !env.ACT }}
        run: uv run alembic upgrade head
      - name: pytest
        run: uv run pytest
      # Coverage upload is irrelevant under local `act`; skip it there.
      - name: Upload test summary
        if: ${{ !env.ACT }}
        run: echo "pytest completed on ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
