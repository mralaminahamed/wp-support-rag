name: CI

# Quality gates for wp-support-rag (NFR-MN-1/2/3).
# Author: Al Amin Ahamed.
#
# Steps unsuitable for local `act` runs are guarded with `if: ${{ !env.ACT }}`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.9.26"

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: mypy --strict
        run: uv run mypy --strict app eval

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: pytest
        run: uv run pytest
      # Coverage upload is irrelevant under local `act`; skip it there.
      - name: Upload test summary
        if: ${{ !env.ACT }}
        run: echo "pytest completed on ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
