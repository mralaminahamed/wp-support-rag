name: Frontend

# Type-check, lint, and build the JS apps (apps/admin) via pnpm + Turborepo.
# Author: Al Amin Ahamed.

on:
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: type-check, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm run type-check
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build

  e2e:
    name: e2e (admin, Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Browser download + system deps are unavailable under local `act`.
      - name: Install Chromium
        if: ${{ !env.ACT }}
        run: pnpm --filter @wp-support-rag/admin exec playwright install --with-deps chromium
      - name: Run e2e (API mocked via page.route)
        if: ${{ !env.ACT }}
        run: pnpm --filter @wp-support-rag/admin run e2e
