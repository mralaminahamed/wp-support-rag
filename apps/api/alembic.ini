# Alembic configuration for wp-support-rag.
# The database URL is resolved at runtime from app.config (env-driven), so it is
# intentionally left blank here; see app/db/migrations/env.py.
# Author: Al Amin Ahamed.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
# Timestamped, slug-friendly revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
