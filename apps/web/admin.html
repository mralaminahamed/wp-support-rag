<!doctype html>
<!--
  Admin console for WP Plugin Support Desk RAG (apps/web).
  Author: Al Amin Ahamed.

  Single-file, build-free operator console. Serve statically from any host. Enter
  the API base URL and your admin bearer token, then list plugins, trigger
  ingestion (per plugin or all), and read live metrics. Talks to /api/v1/admin/*.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WP Support RAG — Admin</title>
    <style>
      :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #1f2937; }
      body { max-width: 960px; margin: 32px auto; padding: 0 16px; }
      h1 { font-size: 22px; }
      .bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 16px 0; }
      input { padding: 8px 10px; border: 1px solid #c4c8ce; border-radius: 8px; font-size: 14px; }
      input#api { width: 260px; } input#token { width: 320px; }
      button { padding: 8px 12px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
      button.secondary { background: #f3f4f6; color: #374151; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
      th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eef0f3; }
      .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
      .card { border: 1px solid #d9dce1; border-radius: 10px; padding: 12px 16px; min-width: 140px; }
      .card b { display: block; font-size: 20px; }
      .muted { color: #6b7280; font-size: 13px; }
      .err { color: #b91c1c; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>WP Support RAG — Admin</h1>

    <div class="bar">
      <input id="api" value="http://localhost:8000" placeholder="API base URL" />
      <input id="token" type="password" placeholder="Admin bearer token" />
      <button id="load">Load</button>
      <button id="ingestAll" class="secondary">Ingest all</button>
      <button id="metrics" class="secondary">Refresh metrics</button>
    </div>
    <div id="status" class="muted"></div>

    <div class="cards" id="cards"></div>

    <h2 style="font-size:16px;margin-top:24px">Plugins</h2>
    <table id="plugins"><thead><tr>
      <th>Slug</th><th>Name</th><th>Sources</th><th>GitHub</th><th>wp.org</th><th></th>
    </tr></thead><tbody></tbody></table>

    <script>
      var $ = function (id) { return document.getElementById(id); };
      function base() { return $("api").value.replace(/\/$/, ""); }
      function headers() { return { Authorization: "Bearer " + $("token").value }; }
      function setStatus(msg, isErr) { var s = $("status"); s.textContent = msg; s.className = isErr ? "err" : "muted"; }

      async function api(path, method) {
        var res = await fetch(base() + path, { method: method || "GET", headers: headers() });
        if (!res.ok) throw new Error(path + " → HTTP " + res.status);
        return res.json();
      }

      async function loadPlugins() {
        setStatus("Loading plugins…");
        try {
          var plugins = await api("/api/v1/admin/plugins");
          var tbody = $("plugins").querySelector("tbody");
          tbody.innerHTML = "";
          plugins.forEach(function (p) {
            var tr = document.createElement("tr");
            tr.innerHTML =
              "<td>" + p.slug + "</td><td>" + p.name + "</td><td>" + p.source_count + "</td>" +
              "<td>" + (p.github_repo || "—") + "</td><td>" + (p.wporg_slug || "—") + "</td>";
            var td = document.createElement("td");
            var b = document.createElement("button");
            b.textContent = "Ingest";
            b.onclick = function () { ingest(p.slug); };
            td.appendChild(b);
            tr.appendChild(td);
            tbody.appendChild(tr);
          });
          setStatus(plugins.length + " plugins loaded.");
        } catch (e) { setStatus(e.message, true); }
      }

      async function ingest(slug) {
        setStatus("Triggering ingestion for " + slug + "…");
        try {
          var r = await api("/api/v1/admin/ingest/" + slug, "POST");
          setStatus(slug + ": enqueued " + r.enqueued_sources + " sources.");
        } catch (e) { setStatus(e.message, true); }
      }

      async function ingestAll() {
        setStatus("Triggering ingestion for all plugins…");
        try {
          var r = await api("/api/v1/admin/ingest", "POST");
          setStatus("Enqueued " + r.enqueued_sources + " sources across " + r.plugins + " plugins.");
        } catch (e) { setStatus(e.message, true); }
      }

      async function loadMetrics() {
        setStatus("Loading metrics…");
        try {
          var m = await api("/api/v1/admin/metrics");
          var fmt = { total_queries: "Queries", deflection_rate: "Deflection", helpful_rate: "Helpful",
            cache_hit_rate: "Cache hit", degraded_rate: "Degraded", mean_cost_usd: "Mean $/query", p95_latency_ms: "p95 ms" };
          $("cards").innerHTML = Object.keys(fmt).map(function (k) {
            var v = m[k];
            if (k.endsWith("_rate")) v = (v * 100).toFixed(1) + "%";
            else if (k === "mean_cost_usd") v = "$" + Number(v).toFixed(4);
            return "<div class='card'><span class='muted'>" + fmt[k] + "</span><b>" + v + "</b></div>";
          }).join("");
          setStatus("Metrics updated.");
        } catch (e) { setStatus(e.message, true); }
      }

      $("load").onclick = function () { loadPlugins(); loadMetrics(); };
      $("ingestAll").onclick = ingestAll;
      $("metrics").onclick = loadMetrics;
    </script>
  </body>
</html>
