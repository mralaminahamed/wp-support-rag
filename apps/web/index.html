<!doctype html>
<!--
  External-page embedding demo for the support widget (FR-DL-2).
  Author: Al Amin Ahamed.

  Serve this file from any host. The single script tag below loads the widget
  and auto-mounts it for the given plugin. Set data-api-base to your API origin
  (defaults to same-origin when omitted).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Swift Menu Duplicator — Support</title>
    <meta
      name="description"
      content="Get instant, cited answers to Swift Menu Duplicator support questions, grounded in the plugin's documentation."
    />
    <meta name="author" content="Al Amin Ahamed" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#6366f1" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Swift Menu Duplicator — Support" />
    <meta
      property="og:description"
      content="Instant, cited answers grounded in the plugin's documentation."
    />
    <meta property="og:site_name" content="WP Support RAG" />
    <meta name="twitter:card" content="summary" />

    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        max-width: 720px;
        margin: 48px auto;
        padding: 0 16px;
        color: #1e2330;
      }
      h1 { font-size: 20px; }
      p { color: #475569; }
    </style>
  </head>
  <body>
    <h1>Swift Menu Duplicator — Support</h1>
    <p>Ask a question and get a cited answer from the documentation.</p>

    <script
      src="./widget.js"
      data-plugin-slug="swift-menu-duplicator"
      data-api-base="http://localhost:8000"></script>
  </body>
</html>
